openapi: 3.0.3
info:
  title: KNFAPP API
  description: Backend API for VU Kaunas Faculty mobile app
  version: 1.6.0
  contact:
    name: VU KNF IT
servers:
  - url: /api
    description: API server

tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication & registration
  - name: news
    description: News feed & posts
  - name: schedule
    description: Class timetable
  - name: admin
    description: Admin operations
  - name: scraper
    description: News scraper status
  - name: chat
    description: Messaging & conversations
  - name: social
    description: Friends, profiles, wall posts
  - name: polls
    description: Post polls & voting
  - name: uploads
    description: File uploads (images)
  - name: info
    description: Faculty information (contacts, links, hours, FAQ)

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [auth]
      summary: Register (invitation code optional)
      description: |
        Register a new user. Invitation code is optional:
        - With valid code: user gets the code's role and invited=true (higher trust).
        - Without code: user registers as student with invited=false (guest, limited features).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, display_name, email]
              properties:
                invitation_code:
                  type: string
                  description: Optional invitation code for higher-trust registration
                username:
                  type: string
                password:
                  type: string
                  minLength: 6
                display_name:
                  type: string
                  maxLength: 100
                email:
                  type: string
                  format: email
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input or invitation code
        "409":
          description: Username or email already exists

  /auth/login:
    post:
      tags: [auth]
      summary: Login with username/email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/validate-code:
    post:
      tags: [auth]
      summary: Validate invitation code without consuming it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Invitation code to validate
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  error:
                    type: string
                  role:
                    type: string
                    enum: [student, teacher, admin, curator]
                  remainingUses:
                    type: integer

  /auth/me:
    get:
      tags: [auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
    put:
      tags: [auth]
      summary: Update current user profile (display name, avatar)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  maxLength: 100
                avatar_url:
                  type: string
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: No fields to update
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout (invalidate session)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  # ── News ──────────────────────────────────────────────────────────────────

  /news:
    get:
      tags: [news]
      summary: Get unified news feed
      description: >
        Returns a paginated, ranked feed mixing scraped news (knf.vu.lt, vu.lt),
        faculty posts, and user/friend posts. Guest users see only public posts.
        Authenticated users also see friend posts.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: source
          in: query
          schema:
            type: string
            enum: [knf.vu.lt, vu.lt, faculty, user, app]
      responses:
        "200":
          description: Feed page
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/NewsPost"
                  page:
                    type: integer
                  perPage:
                    type: integer
                  total:
                    type: integer
                  hasMore:
                    type: boolean
    post:
      tags: [news]
      summary: Create a new post
      description: >
        Authenticated users can create posts. Source is auto-detected based on user role:
        faculty for staff (admin/teacher/curator), user for students.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                title:
                  type: string
                content:
                  type: string
                image_url:
                  type: string
                is_public:
                  type: boolean
                  default: true
                post_type:
                  type: string
                  enum: [social, announcement, poll]
                  default: social
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
        "401":
          description: Not authenticated

  /news/{postId}:
    get:
      tags: [news]
      summary: Get a single post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
        "404":
          description: Not found
    delete:
      tags: [news]
      summary: Delete a news post (author or admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
        "403":
          description: Not the post author or admin
        "404":
          description: Post not found

  /news/{postId}/like:
    post:
      tags: [news]
      summary: Toggle like on a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked:
                    type: boolean
                  likes:
                    type: integer

  /news/{postId}/comments:
    get:
      tags: [news]
      summary: Get comments for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                  total:
                    type: integer
                  page:
                    type: integer
                  perPage:
                    type: integer
    post:
      tags: [news]
      summary: Add a comment
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  # ── Polls ─────────────────────────────────────────────────────────────────

  /news/{postId}/poll:
    get:
      tags: [polls]
      summary: Get poll for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Poll data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"
        "404":
          description: No poll for this post
    post:
      tags: [polls]
      summary: Create a poll on a post (author or admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, options]
              properties:
                title:
                  type: string
                options:
                  type: array
                  minItems: 2
                  maxItems: 10
                  items:
                    type: string
                end_date:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Poll created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"
        "403":
          description: Not the post author or admin

  /news/{postId}/poll/vote:
    post:
      tags: [polls]
      summary: Vote on a poll option
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [option_id]
              properties:
                option_id:
                  type: string
      responses:
        "200":
          description: Vote recorded (returns updated poll)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"
        "401":
          description: Not authenticated

  # ── Schedule ──────────────────────────────────────────────────────────────

  /schedule:
    get:
      tags: [schedule]
      summary: Get schedule/timetable
      parameters:
        - name: day
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 6
        - name: group
          in: query
          schema:
            type: string
        - name: semester
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lessons for the day
          content:
            application/json:
              schema:
                type: object
                properties:
                  lessons:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lesson"

  /schedule/filters:
    get:
      tags: [schedule]
      summary: Get available groups and semesters for filtering
      responses:
        "200":
          description: Available filter values
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      type: string
                    example: ["ISKS-1", "ISKS-2", "VVB-1"]
                  semesters:
                    type: array
                    items:
                      type: string
                    example: ["2025-P", "2025-R"]

  # ── Chat ──────────────────────────────────────────────────────────────────

  /chat/conversations:
    get:
      tags: [chat]
      summary: List all conversations for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conversation"
    post:
      tags: [chat]
      summary: Create a new conversation (direct or group)
      description: >
        For direct chats between two users, if a conversation already exists
        it returns the existing conversation ID instead of creating a duplicate.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [participantIds]
              properties:
                participantIds:
                  type: array
                  items:
                    type: string
                type:
                  type: string
                  enum: [direct, group]
                  default: direct
                title:
                  type: string
                  description: Group chat title
                avatarEmoji:
                  type: string
                  description: Group chat emoji avatar
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
        "200":
          description: Existing direct conversation found
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string

  /chat/conversations/{convId}/messages:
    get:
      tags: [chat]
      summary: Get messages for a conversation (cursor-based pagination)
      security:
        - bearerAuth: []
      parameters:
        - name: convId
          in: path
          required: true
          schema:
            type: string
        - name: before
          in: query
          description: Cursor — ISO datetime string; returns messages older than this
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  hasMore:
                    type: boolean
        "403":
          description: Not a participant
    post:
      tags: [chat]
      summary: Send a message to a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: convId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                imageUrl:
                  type: string
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/Message"
        "403":
          description: Not a participant

  /chat/conversations/{convId}/messages/{msgId}/react:
    post:
      tags: [chat]
      summary: Add or change reaction on a message (one per user)
      security:
        - bearerAuth: []
      parameters:
        - name: convId
          in: path
          required: true
          schema:
            type: string
        - name: msgId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
      responses:
        "200":
          description: Reaction set
    delete:
      tags: [chat]
      summary: Remove reaction from a message
      security:
        - bearerAuth: []
      parameters:
        - name: convId
          in: path
          required: true
          schema:
            type: string
        - name: msgId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reaction removed

  /chat/conversations/{convId}/pin:
    put:
      tags: [chat]
      summary: Toggle pin status for a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: convId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pin toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  pinned:
                    type: boolean

  /chat/conversations/{convId}/read:
    put:
      tags: [chat]
      summary: Mark conversation as read
      description: Updates last_read_at and inserts per-message read receipts. Broadcasts messages_read Socket.IO event to conversation participants.
      security:
        - bearerAuth: []
      parameters:
        - name: convId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  readCount:
                    type: integer
                    description: Number of newly read messages

  /chat/unread-count:
    get:
      tags: [chat]
      summary: Get total unread message count
      description: Returns the sum of unread messages across all conversations the user participates in. Used for the Messages tab badge.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer

  /chat/conversations/{convId}:
    delete:
      tags: [chat]
      summary: Leave a conversation
      description: Removes the user from the conversation. If no participants remain, the conversation and its messages are deleted.
      security:
        - bearerAuth: []
      parameters:
        - name: convId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left conversation

  /chat/users/search:
    get:
      tags: [chat]
      summary: Search users by name/username for new conversations
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: User search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"

  # ── Social ────────────────────────────────────────────────────────────────

  /social/profile/{userId}:
    get:
      tags: [social]
      summary: Get a user's public profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found

  /social/profile:
    put:
      tags: [social]
      summary: Update own profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                avatar_url:
                  type: string
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /social/friends/request:
    post:
      tags: [social]
      summary: Send a friend request
      description: >
        If the target user already sent a friend request to you,
        this auto-accepts the friendship (bidirectional).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
      responses:
        "201":
          description: Friend request sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    enum: [pending]
        "200":
          description: Auto-accepted (mutual request)
        "409":
          description: Already friends or request already pending

  /social/friends/requests:
    get:
      tags: [social]
      summary: List pending friend requests
      security:
        - bearerAuth: []
      parameters:
        - name: direction
          in: query
          schema:
            type: string
            enum: [received, sent]
            default: received
      responses:
        "200":
          description: Friend request list
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendRequest"

  /social/friends/requests/{requestId}/accept:
    post:
      tags: [social]
      summary: Accept a friend request
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request accepted
        "404":
          description: Request not found

  /social/friends/requests/{requestId}/reject:
    post:
      tags: [social]
      summary: Reject a friend request
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request rejected
        "404":
          description: Request not found

  /social/friends:
    get:
      tags: [social]
      summary: List current user's friends
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: object
                properties:
                  friends:
                    type: array
                    items:
                      $ref: "#/components/schemas/Friend"

  /social/friends/{userId}:
    delete:
      tags: [social]
      summary: Unfriend a user (bidirectional)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unfriended
        "404":
          description: Not friends

  /social/posts:
    get:
      tags: [social]
      summary: Get posts by a specific user
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: User's posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/NewsPost"
                  page:
                    type: integer
                  perPage:
                    type: integer
                  total:
                    type: integer
                  hasMore:
                    type: boolean
    post:
      tags: [social]
      summary: Create a wall post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                title:
                  type: string
                image_url:
                  type: string
                is_public:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"

  /social/posts/{postId}:
    put:
      tags: [social]
      summary: Edit own wall post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                title:
                  type: string
                image_url:
                  type: string
      responses:
        "200":
          description: Post updated
        "404":
          description: Post not found or not yours
    delete:
      tags: [social]
      summary: Delete own wall post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
        "404":
          description: Post not found or not yours

  # ── Admin ─────────────────────────────────────────────────────────────────

  /admin/invitations:
    post:
      tags: [admin]
      summary: Create invitation code
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [student, teacher, admin, curator]
                  default: student
                max_uses:
                  type: integer
                  default: 1
                expires_hours:
                  type: integer
                  default: 168
      responses:
        "201":
          description: Invitation created
    get:
      tags: [admin]
      summary: List invitation codes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Invitation list

  /admin/users:
    get:
      tags: [admin]
      summary: List all users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list

  /admin/users/{userId}:
    patch:
      tags: [admin]
      summary: Update user role or active status
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [student, teacher, curator, admin]
                active:
                  type: boolean
      responses:
        "200":
          description: Updated user
        "400":
          description: Invalid role or nothing to update
        "404":
          description: User not found

  /admin/stats:
    get:
      tags: [admin]
      summary: Admin dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats

  # ── Scraper ───────────────────────────────────────────────────────────────

  /scraper/status:
    get:
      tags: [scraper]
      summary: Recent scraper runs
      responses:
        "200":
          description: Scraper run history

  /scraper/trigger:
    post:
      tags: [scraper]
      summary: Manually trigger scrape (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Scrape results

  /uploads:
    post:
      tags: [uploads]
      summary: Upload an image file
      description: |
        Upload an image (jpg, jpeg, png, gif, webp). Max 5 MB.
        Returns a URL path to access the uploaded file.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: /api/uploads/abc123.png
                  filename:
                    type: string
                    example: abc123.png
        "400":
          description: Bad request (no file, invalid type, too large)
        "401":
          description: Authentication required

  /uploads/{filename}:
    get:
      tags: [uploads]
      summary: Serve an uploaded file
      description: No authentication required. Images are publicly accessible.
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: File not found

  /info:
    get:
      tags: [info]
      summary: Get faculty information
      description: Returns contacts, links, building hours, study programs, and FAQ
      parameters:
        - name: lang
          in: query
          schema:
            type: string
            enum: [lt, en]
            default: lt
          description: Language (lt or en)
        - name: section
          in: query
          schema:
            type: string
            enum: [contacts, links, hours, programs, faq]
          description: Filter to a single section
      responses:
        "200":
          description: Faculty information
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        category:
                          type: string
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              phone:
                                type: string
                              email:
                                type: string
                              room:
                                type: string
                  links:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        url:
                          type: string
                        icon:
                          type: string
                  hours:
                    type: array
                    items:
                      type: object
                      properties:
                        place:
                          type: string
                        address:
                          type: string
                        schedule:
                          type: string
                        note:
                          type: string
                  programs:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        degree:
                          type: string
                        duration:
                          type: string
                  faq:
                    type: array
                    items:
                      type: object
                      properties:
                        q:
                          type: string
                        a:
                          type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [student, teacher, admin, curator]
        avatarUrl:
          type: string
          nullable: true
        invited:
          type: boolean
          description: Whether user registered via invitation code (true = higher trust)

    UserSummary:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    NewsPost:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        imageUrl:
          type: string
          nullable: true
        author:
          type: string
        authorId:
          type: string
          nullable: true
        source:
          type: string
          enum: [knf.vu.lt, vu.lt, faculty, user, app]
        sourceUrl:
          type: string
          nullable: true
        postType:
          type: string
          enum: [article, social, announcement, poll, link]
        likes:
          type: integer
        comments:
          type: integer
        shares:
          type: integer
        date:
          type: string
        isPublic:
          type: boolean
        liked:
          type: boolean
          description: Whether the current user has liked this post

    Comment:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        time:
          type: string
        userName:
          type: string
        userAvatar:
          type: string
          nullable: true
        userId:
          type: string

    Lesson:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        teacher:
          type: string
        room:
          type: string
        timeStart:
          type: string
        timeEnd:
          type: string
        dayOfWeek:
          type: integer
        group:
          type: string
        semester:
          type: string

    Conversation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [direct, group]
        title:
          type: string
        avatarEmoji:
          type: string
          nullable: true
        pinned:
          type: boolean
        unreadCount:
          type: integer
        lastUpdatedMs:
          type: integer
          description: Unix timestamp in milliseconds
        participants:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              displayName:
                type: string
              avatarUrl:
                type: string
                nullable: true
        lastMessage:
          type: object
          nullable: true
          properties:
            id:
              type: string
            text:
              type: string
            imageUrl:
              type: string
              nullable: true
            time:
              type: string
            senderId:
              type: string
            senderName:
              type: string

    Message:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderAvatar:
          type: string
          nullable: true
        text:
          type: string
        imageUrl:
          type: string
          nullable: true
        time:
          type: string
          description: "HH:MM format"
        createdAt:
          type: string
          description: ISO datetime
        isOwn:
          type: boolean
        status:
          type: string
          enum: [sent, delivered, read]
          description: "Read receipt status. sent=no other readers, delivered=some read, read=all read."
        readBy:
          type: array
          items:
            type: string
          description: User IDs who have read this message
        reactions:
          type: array
          items:
            type: object
            properties:
              emoji:
                type: string
              count:
                type: integer
              bySelf:
                type: boolean
              byUserIds:
                type: array
                items:
                  type: string

    Poll:
      type: object
      properties:
        id:
          type: string
        postId:
          type: string
        title:
          type: string
        endDate:
          type: string
          nullable: true
        totalVotes:
          type: integer
        createdAt:
          type: string
        userVote:
          type: string
          nullable: true
          description: Option ID the current user voted for
        options:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              text:
                type: string
              votes:
                type: integer

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
        createdAt:
          type: string
        postCount:
          type: integer
        friendCount:
          type: integer
        friendshipStatus:
          type: string
          enum: [none, friends, request_sent, request_received]

    FriendRequest:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
        createdAt:
          type: string

    Friend:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
        friendsSince:
          type: string
